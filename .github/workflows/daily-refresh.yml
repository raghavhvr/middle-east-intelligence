name: Daily Pulse Refresh

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 09:00 GST daily
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # GitHub's hard limit is 360 min. Backfill can take ~2h on first run.
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run collector
        env:
          ACLED_EMAIL:          ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD:       ${{ secrets.ACLED_PASSWORD }}
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python scripts/collect.py

      - name: Commit and push data
        # if: always() ensures this runs even if the collector step timed out or errored.
        # That way checkpoint files written mid-run get committed, and the next run
        # can resume from where it left off instead of starting over.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git commit -m "chore: daily pulse refresh $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
