name: Daily Pulse Refresh

on:
  schedule:
    - cron: '0 3 * * *'   # Primary:  03:00 UTC = 06:00 GST
    - cron: '0 6 * * *'   # Fallback: 06:00 UTC = 09:00 GST (in case GitHub skips the first)
  workflow_dispatch:       # Manual trigger from Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if already ran today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          LAST=$(git log --oneline --format="%s" -5 | grep "daily pulse refresh" | head -1 | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' || echo "never")
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "last=$LAST" >> $GITHUB_OUTPUT
          if [ "$LAST" = "$TODAY" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already ran today ($TODAY), skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Last run was $LAST, proceeding for $TODAY."
          fi

      - name: Set up Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install requests python-dotenv

      - name: Run collector (attempt 1)
        id: run1
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        env:
          ACLED_EMAIL:          ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD:       ${{ secrets.ACLED_PASSWORD }}
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python scripts/collect.py

      - name: Run collector (attempt 2 - retry on failure)
        id: run2
        if: steps.check.outputs.skip == 'false' && steps.run1.outcome == 'failure'
        continue-on-error: true
        env:
          ACLED_EMAIL:          ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD:       ${{ secrets.ACLED_PASSWORD }}
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          echo "Attempt 1 failed, retrying after 60s..."
          sleep 60
          python scripts/collect.py

      - name: Commit and push data
        if: always() && steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add public/
          git commit -m "chore: daily pulse refresh $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "### Skipped - already ran today (${{ steps.check.outputs.today }})" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run1.outcome }}" = "success" ]; then
            echo "### Collector succeeded on first attempt" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run2.outcome }}" = "success" ]; then
            echo "### Collector succeeded on retry (attempt 2)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Collector failed on both attempts - checkpoint saved for next run" >> $GITHUB_STEP_SUMMARY
          fi
